<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drag - Drop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h2>Drag and Drop</h2>

    <div id="box" draggable="true">Drag me</div>
    <div id="dropZone">Drop here</div>
    <!-- target area where the box can be dropped -->

    <script>
        const box = document.getElementById('box'); // finds drag box and stores it in a variable

        const dropZone = document.getElementById('dropZone')//finds drop area and stores it in var

        box.addEventListener('dragstart', function(event){
            //runs when dragstarts
            event.dataTransfer.setData('text', event.target.id)//saves id of drag el
            //text is data type label
            //event.target.id is  'box'
        })

        dropZone.addEventListener('dragover', function(event){
            //runs repeatedly while the dragged item is over the drop zone (not dropped yet)
            event.preventDefault()//prevents browser default blocking behavior
            //this is required to allow drop in zone
        })
        
        dropZone.addEventListener('dragenter', function(event){
            //runs when the drag item first enters the drop area
            event.preventDefault()//helps keep area as valid drop target
            dropZone.classList.add('hovered')//adds a CSS class so the drop zone changes color
        })  

        dropZone.addEventListener('dragleave', function(event){
            //runs when box leaves drop zone
            dropZone.classList.remove('hovered')//removes the highlight color
        })

        dropZone.addEventListener('drop', function(event){
            //runs when the drag item finally drops in zone
            event.preventDefault()//stops the default behavior during drop
            const id = event.dataTransfer.getData('text')//gets back the saved id from dragstart
            const draggedEl = document.getElementById(id) //uses the id to find the real dragged element
            dropZone.textContent = ''
            //removes the text "drop here"
            dropZone.classList.remove('hovered')//remove the hover bcg
            draggedEl.style.margin = "0"//removes the old auto margin to the box fits nearly inside the zonce
            dropZone.appendChild(draggedEl)//moves the dragged box into the drop zone
        })
    </script>
</body>
</html>
